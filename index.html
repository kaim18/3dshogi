<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D将棋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
    #app { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    /* Overlay UI */
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; display: flex; flex-direction: column;
      justify-content: space-between; align-items: center;
    }
    .hand-bar {
      pointer-events: auto; display: flex; gap: 4px; padding: 8px;
      background: rgba(0,0,0,0.5); border-radius: 4px; margin: 8px;
    }
    .hand-item {
      width: 40px; height: 48px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #ccc;
      font-size: 20px; cursor: pointer; border: 1px solid transparent;
      border-radius: 4px; user-select: none;
    }
    .hand-item.selectable { color: #fff; border-color: #555; }
    .hand-item.selected { background: rgba(0,180,255,0.3); border-color: #0bf; }
    .hand-item .count { font-size: 13px; color: #aaa; }

    #turn-indicator {
      pointer-events: auto; position: absolute; top: 8px; right: 8px;
      color: #fff; font-size: 18px; background: rgba(0,0,0,0.5);
      padding: 6px 14px; border-radius: 4px;
    }
    #controls {
      pointer-events: auto; position: absolute; bottom: 8px; right: 8px;
      display: flex; gap: 4px;
    }
    #controls button {
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 15px;
    }
    #controls button:hover { background: rgba(255,255,255,0.3); }
    #controls button.active { background: rgba(0,180,255,0.35); border: 1px solid #0bf; }

    #promote-dialog, #gameover-dialog {
      pointer-events: auto; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: rgba(0,0,0,0.85);
      color: #fff; padding: 20px; border-radius: 8px; display: none;
      text-align: center;
    }
    #promote-dialog button, #gameover-dialog button {
      margin: 8px; padding: 8px 20px; font-size: 16px; cursor: pointer;
      border: none; border-radius: 4px;
    }
    #btn-promote { background: #e63946; color: #fff; }
    #btn-no-promote { background: #457b9d; color: #fff; }
    #gameover-dialog .winner { font-size: 24px; margin-bottom: 12px; }
    #btn-restart { background: #2a9d8f; color: #fff; }

    #btn-help {
      position: absolute; top: 8px; left: 8px; pointer-events: auto;
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      font-size: 22px; font-weight: bold; line-height: 40px; text-align: center;
    }
    #btn-help:hover { background: rgba(255,255,255,0.3); }

    #btn-encyclopedia {
      position: absolute; top: 8px; left: 56px; pointer-events: auto;
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      font-size: 20px; line-height: 40px; text-align: center;
    }
    #btn-encyclopedia:hover { background: rgba(255,255,255,0.3); }

    #encyclopedia-panel {
      pointer-events: auto; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.92);
      color: #ddd; display: none; z-index: 10;
    }
    .close-encyclopedia {
      position: absolute; top: 10px; right: 16px; background: none;
      border: none; color: #fff; font-size: 28px; cursor: pointer; z-index: 11;
    }
    .encyclopedia-layout {
      display: flex; height: 100%; padding: 40px 16px 16px;
    }
    .piece-list {
      width: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
      padding-right: 8px;
    }
    .piece-list button {
      background: rgba(255,255,255,0.08); color: #ddd; border: none;
      padding: 8px; border-radius: 4px; cursor: pointer; font-size: 15px;
      text-align: left;
    }
    .piece-list button:hover { background: rgba(255,255,255,0.18); }
    .piece-list button.active { background: rgba(0,180,255,0.3); color: #fff; }
    .piece-preview {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
    }
    .piece-title { font-size: 22px; color: #fff; }
    #encyclopedia-canvas { border-radius: 8px; }
    .piece-desc { font-size: 14px; color: #aaa; max-width: 400px; text-align: center; line-height: 1.6; }

    #help-panel {
      pointer-events: auto; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.9);
      color: #ddd; display: none; overflow-y: auto; z-index: 10;
      padding: 40px 20px 20px;
    }
    #help-panel .help-inner {
      max-width: 700px; margin: 0 auto; font-size: 14px; line-height: 1.7;
    }
    #help-panel h2 { color: #fff; font-size: 20px; margin: 20px 0 8px; border-bottom: 1px solid #444; padding-bottom: 4px; }
    #help-panel h3 { color: #dbb07a; font-size: 15px; margin: 14px 0 4px; }
    #help-panel table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    #help-panel th, #help-panel td { padding: 4px 10px; text-align: left; border-bottom: 1px solid #333; }
    #help-panel th { color: #dbb07a; font-size: 13px; }
    #help-panel .close-help {
      position: absolute; top: 10px; right: 16px; background: none;
      border: none; color: #fff; font-size: 28px; cursor: pointer;
    }
    #help-panel kbd {
      background: #333; padding: 1px 6px; border-radius: 3px; font-size: 12px; color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <div id="gote-hand" class="hand-bar"></div>
      <div id="sente-hand" class="hand-bar"></div>
    </div>
    <div id="turn-indicator"></div>
    <div id="controls">
      <button id="btn-undo">待った</button>
      <button id="btn-layout" class="active">Cube</button>
      <button id="btn-z1">Z1</button>
      <button id="btn-z2">Z2</button>
      <button id="btn-z3">Z3</button>
    </div>
    <div id="promote-dialog">
      <div>成りますか？</div>
      <button id="btn-promote">成る</button>
      <button id="btn-no-promote">不成</button>
    </div>
    <div id="gameover-dialog">
      <div class="winner" id="winner-text"></div>
      <button id="btn-restart">最初から</button>
    </div>
    <button id="btn-lang">🌐 EN</button>
    <button id="btn-help">?</button>
    <button id="btn-encyclopedia">📖</button>
    <div id="encyclopedia-panel">
      <button class="close-encyclopedia" id="close-encyclopedia">×</button>
      <div class="encyclopedia-layout">
        <div class="piece-list" id="piece-list"></div>
        <div class="piece-preview">
          <div class="piece-title" id="piece-title"></div>
          <canvas id="encyclopedia-canvas"></canvas>
          <div class="piece-desc" id="piece-desc"></div>
        </div>
      </div>
    </div>
    <div id="help-panel">
      <button class="close-help" id="close-help">×</button>
      <div class="help-inner" id="help-inner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
